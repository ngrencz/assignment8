<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Portal | Login</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = "https://khazeoycsjdqnmwodncw.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtoYXplb3ljc2pkcW5td29kbmN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI5MDMwOTMsImV4cCI6MjA3ODQ3OTA5M30.h-WabaGcQZ968sO2ImetccUaRihRFmO2mUKCdPiAbEI";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
    </script>
    
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #f8fafc; 
            font-family: sans-serif;
        }
        .login-bubble {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 320px;
            border: 1px solid #e2e8f0;
        }
        .field-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; color: #1e293b;}
        select { width: 100%; padding: 10px; border-radius: 6px; border: 2px solid #cbd5e1; box-sizing: border-box; font-size: 1rem; outline: none;}
        select:focus { border-color: #3b82f6; }
        
        /* Google Button Styling */
        .google-btn { 
            width: 100%; 
            padding: 12px; 
            background-color: #ffffff; 
            color: #475569; 
            border: 2px solid #cbd5e1; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
        }
        .google-btn:hover { background-color: #f1f5f9; border-color: #94a3b8; }
        .google-icon { width: 20px; height: 20px; }
        
        #loading-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); justify-content: center; align-items: center;
            font-size: 1.5rem; font-weight: bold; color: #3b82f6; z-index: 1000;
        }
    </style>
</head>
<body>

<div id="loading-overlay">Authenticating...</div>

<div class="login-bubble">
    <h2 style="text-align: center; margin-top: 0; color: #1e293b;">Student Portal</h2>
    
    <div class="field-group">
        <label>Class Period</label>
        <select id="hour-select">
            <option value="00">Guest</option>
            <option value="01">01</option>
            <option value="02">02</option>
            <option value="03">03</option>
            <option value="04">04</option>
            <option value="05">05</option>
            <option value="06">06</option>
            <option value="07">07</option>
        </select>
    </div>

    <div class="field-group">
        <label>Assignment</label>
        <select id="lesson-select">
            <option value="5.2.3">Lesson 5.2.3 Independent and Dependent</option>
            <option value="5.2.4">Lesson 5.2.4 How can I find outcomes?</option>
            <option value="5.2.2">Lesson 5.2.2 What if it is more complicated?</option>
        </select>
    </div>
    
    <button class="google-btn" onclick="handleGoogleLogin()">
        <svg class="google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Sign in with Google
    </button>
</div>

<script>
    window.onload = async () => {
        // 1. Catch Deep Links (e.g., ?lesson=C6Review)
        const urlParams = new URLSearchParams(window.location.search);
        const requestedLesson = urlParams.get('lesson');
        if (requestedLesson) {
            const selectEl = document.getElementById('lesson-select');
            if (selectEl.querySelector(`option[value="${requestedLesson}"]`)) {
                selectEl.value = requestedLesson;
            }
        }

        // 2. Did we JUST bounce back from Google? (Google adds a hash to the URL)
        if (window.location.hash.includes('access_token')) {
            document.getElementById('loading-overlay').style.display = 'flex';
            
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                const anonymousUUID = session.user.id;
                const savedHour = sessionStorage.getItem('pending_hour') || document.getElementById('hour-select').value;
                const savedLesson = sessionStorage.getItem('pending_lesson') || document.getElementById('lesson-select').value;

                sessionStorage.setItem('target_user', anonymousUUID); 
                sessionStorage.setItem('current_user', session.user.email); 
                sessionStorage.setItem('target_hour', savedHour);
                sessionStorage.setItem('target_lesson', savedLesson);
                sessionStorage.setItem('total_work_time', 0);
                sessionStorage.removeItem('free_play_mode');

                window.location.href = 'assignment.html';
                return; // Stop the rest of the script
            }
        }
        
        // 3. Are they already logged in from a previous day?
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            // Change the button so they know they don't have to re-authenticate
            const btn = document.querySelector('.google-btn');
            btn.innerHTML = '🚀 Start Practice (Already Logged In)';
            btn.style.backgroundColor = '#dcfce7';
            btn.style.borderColor = '#22c55e';
            btn.style.color = '#166534';
        }
    };

    async function handleGoogleLogin() {
        const hour = document.getElementById('hour-select').value;
        const lesson = document.getElementById('lesson-select').value;

        // Check if they are already logged in
        const { data: { session } } = await supabaseClient.auth.getSession();

        if (session) {
            // Instantly send them to the hub with their NEW dropdown choices
            sessionStorage.setItem('target_user', session.user.id); 
            sessionStorage.setItem('current_user', session.user.email); 
            sessionStorage.setItem('target_hour', hour);
            sessionStorage.setItem('target_lesson', lesson);
            sessionStorage.setItem('total_work_time', 0);
            sessionStorage.removeItem('free_play_mode');

            window.location.href = 'assignment.html';
        } else {
            // Not logged in yet, save choices and go to Google
            sessionStorage.setItem('pending_hour', hour);
            sessionStorage.setItem('pending_lesson', lesson);

            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.href 
                }
            });

            if (error) {
                console.error("Auth error:", error);
                alert("Could not connect to Google. Please try again.");
            }
        }
    }
</script>

</body>
</html>
